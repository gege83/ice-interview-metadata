services:
  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000" # Grafana UI
      - "3200:3200" # tempo endpoint (MCP at http://localhost:3200/api/mcp)
      - "4040:4040" # Pyroscope endpoint
      - "9090:9090" # Prometheus endpoint
      - "4317:4317" # OpenTelemetry GRPC endpoint
      - "4318:4318" # OpenTelemetry HTTP endpoint
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - app-network

  app:
    image: ice-metadata:0.0.1-SNAPSHOT
    environment:
      - OTEL_SERVICE_NAME=ice-metadata
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4318  # Direct to LGTM
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_JAVAAGENT_DEBUG=false
      - JAVA_TOOL_OPTIONS=-javaagent:/app/opentelemetry-javaagent.jar
    volumes:
      - ./agent/opentelemetry-javaagent.jar:/app/opentelemetry-javaagent.jar:ro
    depends_on:
      - lgtm
    ports:
      - "8080:8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
